name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    HUSKY: 0

jobs:
    code-check:
        name: Code check
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.13

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Generate Prisma client
              run: bun run db:generate

            - name: Biome check (lint + format)
              run: bun run check

            - name: Typecheck
              run: bun --bun tsc --noEmit

    test:
        name: Tests
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.13

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Generate Prisma client
              run: bun run db:generate

            - name: Run tests
              run: bun test

    build:
        name: Build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: [code-check, test]
        steps:
            - uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.13

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Generate Prisma client
              run: bun run db:generate

            - name: Cache Next.js build
              uses: actions/cache@v4
              with:
                  path: |
                      ${{ github.workspace }}/.next/cache
                  key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
                  restore-keys: |
                      ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-

            - name: Build
              run: bun run build
              env:
                  NEXT_TELEMETRY_DISABLED: "1"
                  # Provide placeholder env for build-time checks; real values come from secrets in deploy.
                  DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
                  BETTER_AUTH_SECRET: ci-placeholder-secret-not-used-at-runtime
                  BETTER_AUTH_URL: http://localhost:3000
